<!-- @dsCard group="Academy Portal" viewport="1280x720" name="Academy Portal" subtitle="Student portal — enrollment gate, the Atrium dashboard & a multimedia course" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Starfall Academy · Portal</title>
<link rel="stylesheet" href="styles.css" />
<link rel="stylesheet" href="portal.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@0.460.0/dist/umd/lucide.min.js"></script>
<script src="_ds_bundle.js"></script>
<style> html, body, #root { height: 100%; } body { margin: 0; } </style>
</head>
<body>
<div id="root"></div>

<!-- Expose the design-system namespace under a short alias for the screens -->
<script>window.SA = window.StarfallAcademyDesignSystem_61fef2;</script>
<script src="data.js"></script>
<script type="text/babel" src="AppShell.jsx"></script>
<script type="text/babel" src="GateScreen.jsx"></script>
<script type="text/babel" src="AtriumScreen.jsx"></script>
<script type="text/babel" src="CourseScreen.jsx"></script>

<script type="text/babel">
  function Portal() {
    const [screen, setScreen] = React.useState("gate");
    const [course, setCourse] = React.useState(null);

    React.useEffect(() => { if (window.lucide) window.lucide.createIcons(); });

    if (screen === "gate") return <window.GateScreen onEnter={() => setScreen("atrium")} />;
    if (screen === "course") return (
      <window.CourseScreen
        course={course}
        onNavigate={(id) => setScreen(id === "atrium" ? "atrium" : "atrium")}
        onBack={() => setScreen("atrium")}
      />
    );
    return (
      <window.AtriumScreen
        onNavigate={(id) => setScreen(id === "atrium" ? "atrium" : "atrium")}
        onOpenCourse={(c) => { setCourse(c); setScreen("course"); }}
      />
    );
  }
  ReactDOM.createRoot(document.getElementById("root")).render(<Portal />);
  setTimeout(() => window.lucide && window.lucide.createIcons(), 120);
</script>
</body>
</html>
