<!DOCTYPE html>
<html>
<head>
  <title>Starfall Academy Compendium</title>
  <link rel="icon" href="https://raw.githubusercontent.com/lilyseabrooke/Starfall-sheet/d122f64ff6b1d381f3e482a5e7e33ce46cd3803a/Crest%20Simple.png" type="image/png">

  <!-- PapaParse -->
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
  <link href="https://cdn.jsdelivr.net/npm/tom-select/dist/css/tom-select.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/tom-select/dist/js/tom-select.complete.min.js"></script>
  
  <style>
	@import url('https://fonts.googleapis.com/css?family=Uncial+Antiqua&display=swap');
	@import url('https://fonts.googleapis.com/css?family=Metamorphous&display=swap');
	@import url('https://fonts.googleapis.com/css?family=Yatra+One&display=swap');
	@import url('https://fonts.googleapis.com/css?family=Spectral&display=swap');
	@import url('https://fonts.googleapis.com/css?family=Material+Icons&display=swap');
	
	:root {
		--card-color: rgb(169 138 95);
	}
  
    body {
      font-family: Spectral;
      margin: 40px;
      background: #f7f7f7;
	  
	  display: flex;
	  flex-direction: column;
	  align-items: center;
    }

    h1 {
		font-family: Uncial Antiqua;
		margin: 10px;
		color: #333333;
		letter-spacing: 2px;
		font-size: clamp(1.5em, 5cqi, 3em);
		text-align: center;
    }
	
	h2 {
		color: #333333;
		letter-spacing: 5px;
		font-size: clamp(.9em, 3cqi, 1.8em);
		text-align: center;
	}

	#filter-bar {
		margin-bottom: 20px;
		margin-top: 10px;
		width: 75%;

		/* Make it sticky */
		position: sticky;
		top: 0;           /* distance from the top of viewport */
		z-index: 1000;    /* stay above other content */
		padding: 10px;  /* optional, to give breathing room */
		display: flex;
		justify-content: center;
	}

    select {
		padding: 8px;
		border: 2px solid #9f9f9f;
		border-radius: 7px;
		font-size: clamp(.75em, 3cqi, 1.5em);
		font-family: Spectral;
    }
	
	#filter-bar input[type="text"] {
		margin-left: 10px;
		padding: 7px;
		border: 2px
		solid #9f9f9f;
		border-radius: 7px;
		font-family: Spectral;
		text-transform: uppercase;
	}

	
	#header {
		display: flex;
		flex-direction: column;
		align-items: center;
		background-color: var(--card-color);
		border-radius: 10px;
		width: 75%;
		padding-top: 20px;
		padding-bottom: 20px;
	}
	
	#filter-button {
		margin-left: 10px;
		padding: 7px 12px;
		font-size: 1em;
		cursor: pointer;
		border: 2px solid #9f9f9f;
		border-radius: 7px;
		background: #fff;
		display: flex;
		align-items: center;
		gap: 5px;
	}

	#filter-button:disabled {
		cursor: default;
		opacity: 0.5;
	}

	#filter-menu {
		position: absolute;
		background: #fff;
		border: 2px solid #9f9f9f;
		border-radius: 8px;
		padding: 15px;
		margin-top: 50px;
		display: none;
		z-index: 1001;
		width: 300px;
		
		
		opacity: 0;
		transform: translateY(-10px);
		pointer-events: none;
		transition: opacity 0.15s ease-in-out, transform 0.15s ease-in-out;
	}

	#filter-menu.show {
		opacity: 1;
		transform: translateY(0);
		pointer-events: auto;
	}
	#filter-menu {
		display: flex;
		flex-direction: column;
	}

	#filter-menu .filter-group {
		margin-bottom: 10px;
	}
	
	#list {
		width: 75%;
	}

    .entry {
      background: white;
      border-radius: 8px;
      margin-bottom: 12px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.08);
      overflow: hidden;
    }

    .entry-header {
      padding: 14px 16px;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-weight: bold;
      background: #ffffff;
    }

    .entry-meta {
      font-weight: normal;
      color: #666;
      font-size: 14px;
    }

    .entry-content {
      padding: 16px;
      border-top: 1px solid #eee;
      display: none;
      line-height: 1.5;
      white-space: pre-wrap;
    }

    .entry.open .entry-content {
      display: flex;
	  flex-direction: column;
    }

    .label {
      font-weight: bold;
      margin-top: 10px;
    }
	
	.ts-control {
	  border: 2px solid #9f9f9f;
	  border-radius: 7px;
	  width: 100%;
	}

	.ts-dropdown {
	  border: 2px solid #9f9f9f;
	  border-radius: 7px;
	}
	
	.ts-wrapper {
		width: 100px;
	}
	
	#filter-menu .ts-wrapper {
		width: 100%;
	}
	#filter-menu input {
		border: 2px solid #9f9f9f;
		border-radius: 7px;
		margin-left: 5px;
		margin-right: 5px;
	}
	
	.material-icons {
		font-size: 19px;
	}
	
	.arrow {
	  display: inline-block;
	  transition: transform 0.1s ease;
	}

	.entry.open .arrow {
	  transform: scale(-1);
	}
	
	.copy-button {
	  margin-top: 10px;
	  padding: 6px 12px;
	  border: 1px solid #9f9f9f;
	  border-radius: 5px;
	  background-color: #fff;
	  cursor: pointer;
	  font-family: Spectral;
	  align-self: flex-start;
	  text-transform: uppercase;
	}
	.copy-button:hover {
	  background-color: #f0f0f0;
	}
	
	.header-copy-button {
	  border: none;
	  background: transparent;
	  cursor: pointer;
	  padding: 2px;
	  font-size: 18px;
	  color: #555;
	}

	.header-copy-button:hover {
	  color: #000;
	}
	
	.entry.classCard.open .entry-content {
		display: grid;
		grid-template-columns: 50% 50%;
	}
	
	.classCardName {
		grid-column: 1 / 3;
		font-size: 2em;
		text-align: center;
		font-weight: bold;
		margin: 10px;
	}
	
	.path-title {
		font-weight: bold;
		font-size: 1.2em;
		text-align: center;
		margin: 10px 0px;
	}
	
	.oddClassRank,
	.evenClassRank {
		padding: 5px;
		margin-bottom: 5px;
	}
	
	.oddClassRank {
		background: #f7f7f7;
	}
	
	.entry.classCard .copy-tag,
	.entry.classCard .copy-button {
		display: none;
	}
	
	#reset-filters-button {
	  margin-top: 5px;
	  padding: 7px 10px;
	  border: 2px solid #9f9f9f;
	  border-radius: 7px;
	  background: #fff;
	  cursor: pointer;
	  font-family: Spectral;
	}

	#reset-filters-button:hover {
	  background: #f0f0f0;
	}
	
  </style>
</head>

<body>

<div id="header">
<img src="https://raw.githubusercontent.com/lilyseabrooke/Starfall-sheet/refs/heads/main/New%20Crest%202.png"></img>
<h1>STARFALL ACADEMY</h1>
<h2>REFERENCE COMPENDIUM</h2>
</div>
<div id="filter-bar">
<select id="category"></select>
	<input 
		type="text" 
		id="search-bar" 
		placeholder=SEARCH
	>
	<button id="filter-button">
		<span class="material-icons">filter_list</span>
	</button>

	<div id="filter-menu">
		<!-- Filter options will be dynamically inserted here -->
	</div>
	
</div>

<div id="list"></div>

<script>
const sheets = {
  "Spells": "https://docs.google.com/spreadsheets/d/e/2PACX-1vTXtnorBMPVkIS5vVvc1hiPA_9MNwo3v5gcC__rVMLa28HHCjuKjCm5f_dwQgXfWVF9jF9rfl6oLsfd/pub?gid=0&single=true&output=csv",
  "Potions": "https://docs.google.com/spreadsheets/d/e/2PACX-1vTXtnorBMPVkIS5vVvc1hiPA_9MNwo3v5gcC__rVMLa28HHCjuKjCm5f_dwQgXfWVF9jF9rfl6oLsfd/pub?gid=646516393&single=true&output=csv",
  "Glyphs": "https://docs.google.com/spreadsheets/d/e/2PACX-1vTXtnorBMPVkIS5vVvc1hiPA_9MNwo3v5gcC__rVMLa28HHCjuKjCm5f_dwQgXfWVF9jF9rfl6oLsfd/pub?gid=1319626806&single=true&output=csv",
  "Wands": "https://docs.google.com/spreadsheets/d/e/2PACX-1vTXtnorBMPVkIS5vVvc1hiPA_9MNwo3v5gcC__rVMLa28HHCjuKjCm5f_dwQgXfWVF9jF9rfl6oLsfd/pub?gid=1233793945&single=true&output=csv",    
  "Artifacts": "https://docs.google.com/spreadsheets/d/e/2PACX-1vTXtnorBMPVkIS5vVvc1hiPA_9MNwo3v5gcC__rVMLa28HHCjuKjCm5f_dwQgXfWVF9jF9rfl6oLsfd/pub?gid=697341861&single=true&output=csv",    
  "Plants": "https://docs.google.com/spreadsheets/d/e/2PACX-1vTXtnorBMPVkIS5vVvc1hiPA_9MNwo3v5gcC__rVMLa28HHCjuKjCm5f_dwQgXfWVF9jF9rfl6oLsfd/pub?gid=699108983&single=true&output=csv",
  "Classes": "https://docs.google.com/spreadsheets/d/e/2PACX-1vTXtnorBMPVkIS5vVvc1hiPA_9MNwo3v5gcC__rVMLa28HHCjuKjCm5f_dwQgXfWVF9jF9rfl6oLsfd/pub?gid=1631797228&single=true&output=csv"
};

const headerFields = {
  spell: entry => `${entry.LEVEL || "UNKNOWN LEVEL"} • ${entry.SUBJECT || "UNKNOWN FIELD"}`,
  potion: entry => `COST: ${entry.COST || "N/A"} • INTENSITY: ${entry.INTENSITY || "N/A"}`,
  glyph: entry => `COST: ${entry.COST || "N/A"} • INTENSITY: ${entry.INTENSITY || "N/A"}`,
  wand: entry => `COST: ${entry.COST || "N/A"}`,
  artifact: entry => `${entry.LEVEL || "UNKNOWN LEVEL"} • ${entry.SUBJECT || "UNKNOWN FIELD"}`,
  plant: entry => `VALUE: ${entry.VALUE || "N/A"} • INTENSITY: ${entry.INTENSITY || "N/A"}`,
  class: entry => ""
};

const dropdown = document.getElementById("category");
const list = document.getElementById("list");

for (let name in sheets) {
  const option = document.createElement("option");
  option.value = name;
  option.textContent = name.toUpperCase();
  dropdown.appendChild(option);
}

// ✅ store the instance
const categorySelect = new TomSelect("#category", {
  create: false,
  sortField: { field: "text", direction: "asc" },
  searchField: [],
  controlInput: null,

  onItemAdd() {
    this.close();
    this.blur();
  }
});

// ✅ collapse filter menu when user opens the category picker
categorySelect.on("dropdown_open", () => {
  filterMenu.classList.remove("show");
});

// ✅ run your existing sheet loading logic via TomSelect change event
categorySelect.on("change", (value) => {

	localStorage.setItem("starfallCompendiumLastCategory", value);

	const listTop = list.offsetTop - 75;
	window.scrollTo({
		top: listTop,
		behavior: "smooth"
	});
	
	let filterButton = document.getElementById("filter-button");
	if (value.toUpperCase() === "CLASSES") {
		filterButton.disabled = true;
	} else {
		filterButton.disabled = false;
	}
	
	loadSheet(value);
});


let currentData = []; // global variable to store current sheet data

function loadSheet() {
  Papa.parse(sheets[dropdown.value], {
    download: true,
    header: true,
    complete: function(results) {
      currentData = results.data; // store globally
      renderEntries(currentData); // initially render all
	  renderFilters(dropdown.value);
	  setupFilterListeners();
    }
  });
}

function renderEntries(data) {
  list.innerHTML = "";
  data.forEach(entry => {
    const card = document.createElement("div");
    const category = entry.ID.split('_')[0].toLowerCase();
	const cardClass = category === "class" ? "entry classCard" : "entry";
    card.className = cardClass;
    const headerFormat = headerFields[category] || (() => "");
	
	if (category !== "class") {
		card.innerHTML = `
		  <div class="entry-header">
			<div>
			  ${entry.NAME || "Unnamed"}
			  <div class="entry-meta">
				${headerFormat(entry)}
			  </div>
			</div>
			<div style="display:flex; align-items:center; gap:5px;">
			  <button class="header-copy-button" title="Copy"><span class="copy-tag material-icons">content_copy</span></button>
			  <div class="arrow">▼</div>
			</div>
		  </div>

		  <div class="entry-content">
			${renderDetails(entry)}
			<button class="copy-button">Copy</button>
		  </div>
		`;
	} else {
		// if card is a class
		card.innerHTML = `
		  <div class="entry-header">
			<div>
			  ${entry.NAME || "Unnamed"}
			  <div class="entry-meta">
				${headerFormat(entry)}
			  </div>
			</div>
			<div style="display:flex; align-items:center; gap:5px;">
			  <button class="header-copy-button" title="Copy"><span class="copy-tag material-icons">content_copy</span></button>
			  <div class="arrow">▼</div>
			</div>
		  </div>

		  <div class="entry-content">
			${renderClassCard(entry)}
			<button class="copy-button">Copy</button>
		  </div>
		`;
	}
	
    card.querySelector(".entry-header").addEventListener("click", () => {
		card.classList.toggle("open");
		
	});
	
	const copyButton = card.querySelector(".copy-button");
	copyButton.addEventListener("click", (e) => {
	  e.stopPropagation(); // prevent toggling the card open
	  copyEntryToClipboard(entry);
	});

	const headerCopyButton = card.querySelector(".header-copy-button");
	headerCopyButton.addEventListener("click", (e) => {
	  e.stopPropagation(); // prevent toggling the card
	  copyEntryToClipboard(entry);
	});

    list.appendChild(card);
  });
}

function renderDetails(entry) {
  let html = "";

  for (let key in entry) {
    if (!entry[key] || key === "Name" || key === "Rank" || key === "Cost") continue;
	
    html += `
      <div class="label">${key}</div>
      <div>${entry[key].toString().replace(/•/g, "<br>")}</div>
    `;
  }
  
 

  return html;
}

function renderClassCard(entry) {
	let html = "";
	
	html += `
		
		<div class="classCardName">${entry["NAME"].toString().replace(/•/g, "<br>")}</div>
		<div class="path-title">${entry["PATH 1"]}</div><div class="path-title">${entry["PATH 2"]}</div>
	`

	for (let rank = 1; rank < 10; rank += 2) {
	const rank1Name = `RANK ${rank}-1 NAME`;
	const rank2Name = `RANK ${rank}-2 NAME`;
	const rank3Name = `RANK ${rank+1}-1 NAME`;
	const rank4Name = `RANK ${rank+1}-2 NAME`;
	
	const rank1Description = `RANK ${rank}-1 DESCRIPTION`;
	const rank2Description = `RANK ${rank}-2 DESCRIPTION`;
	const rank3Description = `RANK ${rank+1}-1 DESCRIPTION`;
	const rank4Description = `RANK ${rank+1}-2 DESCRIPTION`;

	html += `
		<div class="oddClassRank"><strong>${entry[rank1Name].toString()}:</strong> ${entry[rank1Description].toString().replace(/•/g, "<br>")}</div>
		<div class="oddClassRank"><strong>${entry[rank2Name].toString()}:</strong> ${entry[rank2Description].toString().replace(/•/g, "<br>")}</div>
		<div class="evenClassRank"><strong>${entry[rank3Name].toString()}:</strong> ${entry[rank3Description].toString().replace(/•/g, "<br>")}</div>
		<div class="evenClassRank"><strong>${entry[rank4Name].toString()}:</strong> ${entry[rank4Description].toString().replace(/•/g, "<br>")}</div>
	`;
	}

  return html;
}

const filterButton = document.getElementById("filter-button");
const filterMenu = document.getElementById("filter-menu");

filterButton.addEventListener("click", () => {
  filterMenu.classList.toggle("show");
});

document.addEventListener("click", (event) => {
  const isClickInsideMenu = filterMenu.contains(event.target);
  const isClickOnButton = filterButton.contains(event.target);
  
  // If the click is outside both the menu and the button, hide the menu
  if (!isClickInsideMenu && !isClickOnButton) {
    filterMenu.classList.remove("show");
  }
});


function renderFilters(category) {
  filterMenu.innerHTML = ""; // Clear previous filters

  const filterGroups = [];
  
  const subjects=["Any","Alchemy","Arcane History","Artificy","Bestiology","Chronomancy","Counterhexology","Crystallomancy","Demonology","Divination","Draconology","Enchantment","Evocation","Herbalism","Hypnomancy","Illusion","Necromancy","Restoration","Runology","Summoning","Telekinesis","Teleportation","Transmutation","Wandcrafting","Warding"];
  const skills=["Any","Agility","Analyze","Art","Athletics","Comprehend","Concentration","Creature","Deception","Endurance","Hide Object","Improvise","Investigation","Perception","Persuasion","Read Person","Recall Information","Research","Search","Sleight of Hand","Stealth","Tact","Tracking","Willpower","Win Over"];
  const stats=["Any","Focus","Creativity","Logic","Insight","Body","Charm"];

  if (category.toUpperCase() === "SPELLS") {
    appendCategories(filterMenu, "SUBJECT", subjects);
	appendCategories(filterMenu, "STAT", stats);
	appendLevels(filterMenu, "HEX");
	appendRange(filterMenu, "DC");
	appendRadios(filterMenu, "RITUAL");
	appendRadios(filterMenu, "VOLATILE");
  } else if (category.toUpperCase() === "POTIONS") {
	appendRange(filterMenu, "COST");
	appendRange(filterMenu, "INTENSITY");
	appendRadios(filterMenu, "TWISTED");
  } else if (category.toUpperCase() === "GLYPHS") {
	appendRange(filterMenu, "COST");
	appendRange(filterMenu, "INTENSITY");
  } else if (category.toUpperCase() === "WANDS") {
	appendRange(filterMenu, "COST");
	appendRadios(filterMenu, "TWISTED");
  } else if (category.toUpperCase() === "ARTIFACTS") {
	appendCategories(filterMenu, "SUBJECT", subjects);
	appendLevels(filterMenu, "TWISTED");
	appendRange(filterMenu, "COST");
	appendRange(filterMenu, "INTENSITY");
	appendCategories(filterMenu, "SKILL", skills);
	appendRange(filterMenu, "DC");
  } else if (category.toUpperCase() === "PLANTS") {
	appendRange(filterMenu, "VALUE");
	appendRange(filterMenu, "INTENSITY");
	appendRadios(filterMenu, "SINGLE-USE");
  }
  
  appendResetButton(filterMenu);

  
  
}


function appendCategories(target,title,categories) {

	// Build the select
	const subjectDiv = document.createElement("div");
	const titleUpper = title.toUpperCase();
	const titleLower = title.toLowerCase();
    subjectDiv.className = "filter-group";
    subjectDiv.innerHTML = `
      <label>${titleUpper}</label>
      <select id="filter-${titleLower}"></select>
    `;
    target.appendChild(subjectDiv);
	
	// Add the categories
    const categorySelect = document.getElementById(`filter-${titleLower}`);
    categories.forEach(s => {
      const option = document.createElement("option");
      option.value = s.toUpperCase();
      option.textContent = s.toUpperCase();
      categorySelect.appendChild(option);
    });

	new TomSelect(`#filter-${titleLower}`, { create: false });

}

function appendLevels(target, hexName) {

    const levelDiv = document.createElement("div");
    levelDiv.className = "filter-group";
	console.log(hexName);
    levelDiv.innerHTML = `
      <label>LEVEL</label>
      <select id="filter-level">
        <option>ANY</option>
        <option>BASIC</option>
        <option>STANDARD</option>
        <option>ADVANCED</option>
        <option>LEGENDARY</option>
        <option>${hexName}</option>
      </select>
    `;
	
    target.appendChild(levelDiv);
	new TomSelect("#filter-level", {
		create: false,          // disable adding new options
		searchField: [],        // disable text search input
		controlInput: null,     // hide typing area, so only dropdown works
		onItemAdd() {
			this.close();          // close dropdown when selected
			this.blur();
		}
	});

}

function appendRange(target, title) {

    const rangeDiv = document.createElement("div");
	const titleUpper = title.toUpperCase() || "";
	const titleLower = title.toLowerCase() || "";
    rangeDiv.className = "filter-group";
    rangeDiv.innerHTML = `
      <label>${titleUpper}</label>
      <input type="number" id="filter-${titleLower}-min" placeholder="MIN" style="width: 20%;"> -
      <input type="number" id="filter-${titleLower}-max" placeholder="MAX" style="width: 20%;">
    `;
    target.appendChild(rangeDiv);

}

function appendRadios(target, title, options = ["YES", "NO"]) {

	const radioDiv = document.createElement("div");
	const titleUpper = title.toUpperCase();
	const titleLower = title.toLowerCase();
	radioDiv.className = "filter-group";
	let totalHTML = `
		<label>${titleUpper}</label><br>
		<label><input type="radio" name="filter-${titleLower}" value="" checked> ANY</label>
	`;
	for (let currentOption in options) {
		currentOption = options[currentOption].toUpperCase() || "";
		totalHTML += `<label><input type="radio" name="filter-${titleLower}" value="${currentOption}"> ${currentOption}</label>`;
	}
	radioDiv.innerHTML = totalHTML;
	target.appendChild(radioDiv);

}

function appendResetButton(target) {
  const resetDiv = document.createElement("div");
  resetDiv.className = "filter-group";
  resetDiv.innerHTML = `
    <button id="reset-filters-button">CLEAR FILTERS</button>
  `;
  target.appendChild(resetDiv);

  document
    .getElementById("reset-filters-button")
    .addEventListener("click", resetFilters);
}

function resetFilters() {
  const inputs = filterMenu.querySelectorAll(
    "select, input[type=number], input[type=radio], input[type=checkbox]"
  );

  inputs.forEach(input => {
    if (input.type === "radio") {
      if (input.value === "") input.checked = true; // select ANY
    }
    else if (input.type === "number") {
      input.value = "";
    }
    else if (input.type === "checkbox") {
      input.checked = false;
    }
    else if (input.tagName === "SELECT") {
      input.value = "ANY";

      // If TomSelect is applied, reset visually too
      if (input.tomselect) {
        input.tomselect.setValue("ANY", true);
      }
    }
  });

  applyFilters();
}

function setupFilterListeners() {
const inputs = filterMenu.querySelectorAll("select, input[type=radio], input[type=checkbox], input[type=number]");

inputs.forEach(input => {
input.addEventListener("change", applyFilters);
});

}

function entryMatches(entry, filters, search) {
  let show = true;

  // --- Apply all existing filters dynamically ---
  for (let key in filters) {
    const value = filters[key];
    if (!value || value === "ANY") continue;

    const field = key.replace(/^filter-/, "").toUpperCase();
	const splitEntry = entry[field] ? entry[field].split(',') : [];
    // Number ranges
    if (key.toUpperCase().endsWith("-MIN")) {
      const realField = field.toUpperCase().replace("-MIN", "");
      const entryVal = parseFloat(entry[realField]);
      if (isNaN(entryVal) || entryVal < value) show = false;
    } else if (key.toUpperCase().endsWith("-MAX")) {
      const realField = field.toUpperCase().replace("-MAX", "");
      const entryVal = parseFloat(entry[realField]);
      if (isNaN(entryVal) || entryVal > value) show = false;

    }
    // Radio / select filters
	
	// Check if every element is NOT equal to value
	
	if (typeof entry[field] === "string" && splitEntry.every(e => e.toString().toUpperCase().trim() !== value.toUpperCase())) {
	  if (value.toUpperCase() !== "HEX" || entry[field].split(' ')[0].toUpperCase() !== "HEX") {
		show = false;
	  }
	}
  }

  // --- Apply search ---
  if (search) {
    const nameMatch = (entry.NAME || "").toUpperCase().includes(search);
    const idExactMatch = (entry.ID || "").toUpperCase() === search;
    const idAfterUnderscoreMatch = ((entry.ID || "").split("_")[1] || "").toUpperCase() === search;

    if (!(nameMatch || idExactMatch || idAfterUnderscoreMatch)) {
      show = false;
    }
  }

  return show;
}

function applyFilters() {
	// Collect all filters dynamically
	const filters = {};
	const inputs = filterMenu.querySelectorAll("select, input[type=number], input[type=radio], input[type=checkbox]");

	const search = searchBar.value.trim().toUpperCase();
	
	inputs.forEach(input => {
	  const idOrName = input.type === "radio" ? input.name : input.id;

	  if (input.type === "radio") {
		const checked = filterMenu.querySelector(`input[name="${input.name}"]:checked`);
		filters[idOrName] = checked?.value || "";
	  } else if (input.type === "number") {
		filters[idOrName] = input.value ? parseFloat(input.value) : null;
	  } else if (input.type === "checkbox") {
		filters[idOrName] = input.checked;
	  } else { // select
		filters[idOrName] = input.value || "";
	  }
	});

  const categoryKey = dropdown.value;

  list.innerHTML = ""; // clear current entries

  currentData.forEach(entry => {
  if (entryMatches(entry, filters, search)) {
    const card = document.createElement("div");
    card.className = "entry";
    const category = entry.ID.split('_')[0].toLowerCase();
    const headerFormat = headerFields[category] || (() => "");

    if (category !== "class") {
		card.innerHTML = `
		  <div class="entry-header">
			<div>
			  ${entry.NAME || "Unnamed"}
			  <div class="entry-meta">
				${headerFormat(entry)}
			  </div>
			</div>
			<div style="display:flex; align-items:center; gap:5px;">
			  <button class="header-copy-button" title="Copy"><span class="copy-tag material-icons">content_copy</span></button>
			  <div class="arrow">▼</div>
			</div>
		  </div>

		  <div class="entry-content">
			${renderDetails(entry)}
			<button class="copy-button">Copy</button>
		  </div>
		`;
	} else {
		// if card is a class
		card.innerHTML = `
		  <div class="entry-header">
			<div>
			  ${entry.NAME || "Unnamed"}
			  <div class="entry-meta">
				${headerFormat(entry)}
			  </div>
			</div>
			<div style="display:flex; align-items:center; gap:5px;">
			  <button class="header-copy-button" title="Copy"><span class="copy-tag material-icons">content_copy</span></button>
			  <div class="arrow">▼</div>
			</div>
		  </div>

		  <div class="entry-content">
			${renderClassCard(entry)}
			<button class="copy-button">Copy</button>
		  </div>
		`;
	}
	
    card.querySelector(".entry-header").addEventListener("click", () => {
		card.classList.toggle("open");

	});
	
	const copyButton = card.querySelector(".copy-button");
	copyButton.addEventListener("click", (e) => {
	  e.stopPropagation(); // prevent toggling the card open
	  copyEntryToClipboard(entry);
	});
	
	const headerCopyButton = card.querySelector(".header-copy-button");
	headerCopyButton.addEventListener("click", (e) => {
	  e.stopPropagation(); // prevent toggling the card
	  copyEntryToClipboard(entry);
	});
	
    list.appendChild(card);
  }
});
}


const searchBar = document.getElementById("search-bar");
searchBar.addEventListener("input", applyFilters);

function copyEntryToClipboard(entry) {
  const lines = [];

  for (let key in entry) {
    if (key.toUpperCase() === "ID") continue; // skip ID
    let value = entry[key];
    if (!value) continue;

    value = value.toString().trim();

    if (value.toUpperCase() === "YES") {
      // replace YES with the label (field name)
      lines.push(key);
    } else if (value.toUpperCase() === "NO") {
      // skip this line entirely
      continue;
    } else {
      // replace any internal • with line breaks
      lines.push(value.replace(/•/g, "\n"));
    }
  }

  const textToCopy = lines.join("\n");

  navigator.clipboard.writeText(textToCopy);
  
}

if (savedCategory && sheets[savedCategory]) {
  categorySelect.setValue(savedCategory, true); // true = silent change
  loadSheet(savedCategory);

  loadSheet(dropdown.value);
}

renderFilters(dropdown.value);
