<!DOCTYPE html>
<html>
<head>
  <title>Starfall Academy Compendium</title>

  <!-- PapaParse -->
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
  <link href="https://cdn.jsdelivr.net/npm/tom-select/dist/css/tom-select.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/tom-select/dist/js/tom-select.complete.min.js"></script>
  
  <style>
	@import url('https://fonts.googleapis.com/css?family=Uncial+Antiqua&display=swap');
	@import url('https://fonts.googleapis.com/css?family=Metamorphous&display=swap');
	@import url('https://fonts.googleapis.com/css?family=Yatra+One&display=swap');
	@import url('https://fonts.googleapis.com/css?family=Spectral&display=swap');
	@import url('https://fonts.googleapis.com/css?family=Material+Icons&display=swap');
  
    body {
      font-family: Spectral;
      margin: 40px;
      background: #f7f7f7;
	  
	  display: flex;
	  flex-direction: column;
	  align-items: center;
    }

    h1 {
		font-family: Uncial Antiqua;
		margin-top: 20px;
		margin-bottom: 10px;
		color: #333333;
		letter-spacing: 2px;
		font-size: clamp(1.5em, 5cqi, 3em);
		text-align: center;
    }
	
	h2 {
		color: #333333;
		letter-spacing: 5px;
		font-size: clamp(.9em, 3cqi, 1.8em);
		text-align: center;
	}

	#filter-bar {
		margin-bottom: 20px;
		margin-top: 10px;
		width: 75%;

		/* Make it sticky */
		position: sticky;
		top: 0;           /* distance from the top of viewport */
		z-index: 1000;    /* stay above other content */
		padding: 10px;  /* optional, to give breathing room */
		display: flex;
		justify-content: center;
	}

    select {
		padding: 8px;
		border: 2px solid #9f9f9f;
		border-radius: 7px;
		font-size: clamp(.75em, 3cqi, 1.5em);
		font-family: Spectral;
    }
	
	#header {
		display: flex;
		flex-direction: column;
		align-items: center;
		background-color: rgb(169 138 95);
		border-radius: 10px;
		width: 75%;
		padding-top: 20px;
		padding-bottom: 20px;
	}
	
	#filter-button {
		margin-left: 10px;
		padding: 7px 12px;
		font-size: 1em;
		cursor: pointer;
		border: 2px solid #9f9f9f;
		border-radius: 7px;
		background: #fff;
		display: flex;
		align-items: center;
		gap: 5px;
	}

	#filter-menu {
		position: absolute;
		background: #fff;
		border: 2px solid #9f9f9f;
		border-radius: 8px;
		padding: 15px;
		margin-top: 50px;
		display: none;
		z-index: 1001;
		width: 300px;
	}

	#filter-menu {
		display: flex;
		flex-direction: column;
	}

	#filter-menu.hidden {
		display: none;
	}

	#filter-menu .filter-group {
		margin-bottom: 10px;
	}
	
	#list {
		width: 75%;
	}

    .entry {
      background: white;
      border-radius: 8px;
      margin-bottom: 12px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.08);
      overflow: hidden;
      cursor: pointer;
    }

    .entry-header {
      padding: 14px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-weight: bold;
      background: #ffffff;
    }

    .entry-meta {
      font-weight: normal;
      color: #666;
      font-size: 14px;
    }

    .entry-content {
      padding: 16px;
      border-top: 1px solid #eee;
      display: none;
      line-height: 1.5;
      white-space: pre-wrap;
    }

    .entry.open .entry-content {
      display: flex;
	  flex-direction: column;
    }

    .label {
      font-weight: bold;
      margin-top: 10px;
    }
	
	.ts-control {
	  border: 2px solid #9f9f9f;
	  border-radius: 7px;
	  width: 100%;
	}

	.ts-dropdown {
	  border: 2px solid #9f9f9f;
	  border-radius: 7px;
	}
	
	.ts-wrapper {
		width: 100px;
	}
	
	#filter-menu .ts-wrapper {
		width: 100%;
	}
	#filter-menu input {
		border: 2px solid #9f9f9f;
		border-radius: 7px;
		margin-left: 5px;
		margin-right: 5px;
	}
	
	.material-icons {
		font-size: 19px;
	}
  </style>
</head>

<body>

<div id="header">
<img src="https://raw.githubusercontent.com/lilyseabrooke/Starfall-sheet/refs/heads/main/New%20Crest%202.png"></img>
<h1>STARFALL ACADEMY</h1>
<h2>REFERENCE COMPENDIUM</h2>
</div>
<div id="filter-bar">
<select id="category"></select>
	<button id="filter-button">
		<span class="material-icons">filter_list</span>
	</button>

	<div id="filter-menu" class="hidden">
		<!-- Filter options will be dynamically inserted here -->
	</div>
</div>

<div id="list"></div>

<script>
const sheets = {
  "Spells": "https://docs.google.com/spreadsheets/d/e/2PACX-1vTXtnorBMPVkIS5vVvc1hiPA_9MNwo3v5gcC__rVMLa28HHCjuKjCm5f_dwQgXfWVF9jF9rfl6oLsfd/pub?gid=0&single=true&output=csv",
  "Potions": "https://docs.google.com/spreadsheets/d/e/2PACX-1vTXtnorBMPVkIS5vVvc1hiPA_9MNwo3v5gcC__rVMLa28HHCjuKjCm5f_dwQgXfWVF9jF9rfl6oLsfd/pub?gid=646516393&single=true&output=csv",
  "Glyphs": "https://docs.google.com/spreadsheets/d/e/2PACX-1vTXtnorBMPVkIS5vVvc1hiPA_9MNwo3v5gcC__rVMLa28HHCjuKjCm5f_dwQgXfWVF9jF9rfl6oLsfd/pub?gid=1319626806&single=true&output=csv",
  "Wands": "https://docs.google.com/spreadsheets/d/e/2PACX-1vTXtnorBMPVkIS5vVvc1hiPA_9MNwo3v5gcC__rVMLa28HHCjuKjCm5f_dwQgXfWVF9jF9rfl6oLsfd/pub?gid=1233793945&single=true&output=csv",    
  "Artifacts": "https://docs.google.com/spreadsheets/d/e/2PACX-1vTXtnorBMPVkIS5vVvc1hiPA_9MNwo3v5gcC__rVMLa28HHCjuKjCm5f_dwQgXfWVF9jF9rfl6oLsfd/pub?gid=697341861&single=true&output=csv",    
  "Plants": "https://docs.google.com/spreadsheets/d/e/2PACX-1vTXtnorBMPVkIS5vVvc1hiPA_9MNwo3v5gcC__rVMLa28HHCjuKjCm5f_dwQgXfWVF9jF9rfl6oLsfd/pub?gid=699108983&single=true&output=csv",
  "Classes": "https://docs.google.com/spreadsheets/d/e/2PACX-1vTXtnorBMPVkIS5vVvc1hiPA_9MNwo3v5gcC__rVMLa28HHCjuKjCm5f_dwQgXfWVF9jF9rfl6oLsfd/pub?gid=1631797228&single=true&output=csv"
};

const headerFields = {
  spell: entry => `${entry.LEVEL || "UNKNOWN LEVEL"} • ${entry.SUBJECT || "UNKNOWN FIELD"}`,
  potion: entry => `COST: ${entry.COST || "N/A"} • INTENSITY: ${entry.INTENSITY || "N/A"}`,
  glyph: entry => `COST: ${entry.COST || "N/A"} • INTENSITY: ${entry.INTENSITY || "N/A"}`,
  wand: entry => `COST: ${entry.COST || "N/A"}`,
  artifact: entry => `${entry.LEVEL || "UNKNOWN LEVEL"} • ${entry.SUBJECT || "UNKNOWN FIELD"}`,
  plant: entry => `VALUE: ${entry.VALUE || "N/A"} • INTENSITY: ${entry.INTENSITY || "N/A"}`,
  class: entry => ""
};

const dropdown = document.getElementById("category");
const list = document.getElementById("list");

for (let name in sheets) {
  const option = document.createElement("option");
  option.value = name;
  option.textContent = name.toUpperCase();
  dropdown.appendChild(option);
}

new TomSelect("#category", {
  create: false,
  sortField: { field: "text", direction: "asc" },
  searchField: [],
  controlInput: null,

  onItemAdd() {
    this.close();
	this.blur();
  }
});

dropdown.addEventListener("change", loadSheet);


let currentData = []; // global variable to store current sheet data

function loadSheet() {
  Papa.parse(sheets[dropdown.value], {
    download: true,
    header: true,
    complete: function(results) {
      currentData = results.data; // store globally
      renderEntries(currentData); // initially render all
	  setupFilterListeners();
    }
  });
}

function renderEntries(data) {
  list.innerHTML = "";
  data.forEach(entry => {
    const card = document.createElement("div");
    card.className = "entry";
    const category = entry.ID.split('_')[0].toLowerCase();
    const headerFormat = headerFields[category] || (() => "");

    card.innerHTML = `
      <div class="entry-header">
        <div>
          ${entry.NAME || "Unnamed"}
          <div class="entry-meta">
            ${headerFormat(entry)}
          </div>
        </div>
        <div>▼</div>
      </div>

      <div class="entry-content">
        ${renderDetails(entry)}
      </div>
    `;

    card.addEventListener("click", () => {
      card.classList.toggle("open");
    });

    list.appendChild(card);
  });
}

function renderDetails(entry) {
  let html = "";

  for (let key in entry) {
    if (!entry[key] || key === "Name" || key === "Rank" || key === "Cost") continue;

    html += `
      <div class="label">${key}</div>
      <div>${entry[key]}</div>
    `;
  }

  return html;
}

const filterButton = document.getElementById("filter-button");
const filterMenu = document.getElementById("filter-menu");

filterButton.addEventListener("click", () => {
  filterMenu.classList.toggle("hidden");
});


function renderFilters(category) {
  filterMenu.innerHTML = ""; // Clear previous filters

  const filterGroups = [];

  if (category.toUpperCase() === "SPELLS") {
    // Subject (24 options with TomSelect)
    const subjectDiv = document.createElement("div");
    subjectDiv.className = "filter-group";
    subjectDiv.innerHTML = `
      <label>SUBJECT</label>
      <select id="filter-subject"></select>
    `;
    filterMenu.appendChild(subjectDiv);

    // Add the 24 options (replace with your actual fields)
    const subjects = ["Any","Alchemy","Arcane History","Artificy","Bestiology","Chronomancy","Counterhexology","Crystallomancy","Demonology","Divination","Draconology","Enchantment","Evocation","Herbalism","Hypnomancy","Illusion","Necromancy","Restoration","Runology","Summoning","Telekinesis","Teleportation","Transmutation","Wandcrafting","Warding"];
    const subjectSelect = document.getElementById("filter-subject");
    subjects.forEach(s => {
      const option = document.createElement("option");
      option.value = s.toUpperCase();
      option.textContent = s.toUpperCase();
      subjectSelect.appendChild(option);
    });

    new TomSelect("#filter-subject", { create: false });

    // Levels
    const levelDiv = document.createElement("div");
    levelDiv.className = "filter-group";
    levelDiv.innerHTML = `
      <label>LEVEL</label>
      <select id="filter-level">
        <option>ANY</option>
        <option>BASIC</option>
        <option>STANDARD</option>
        <option>ADVANCED</option>
        <option>LEGENDARY</option>
        <option>HEX</option>
      </select>
    `;
	
    filterMenu.appendChild(levelDiv);
	new TomSelect("#filter-level", {
		create: false,          // disable adding new options
		searchField: [],        // disable text search input
		controlInput: null,     // hide typing area, so only dropdown works
		onItemAdd() {
			this.close();          // close dropdown when selected
			this.blur();
		}
	});

    // DC (min/max)
    const dcDiv = document.createElement("div");
    dcDiv.className = "filter-group";
    dcDiv.innerHTML = `
      <label>DC</label>
      <input type="number" id="filter-dc-min" placeholder="MIN" style="width: 20%;"> -
      <input type="number" id="filter-dc-max" placeholder="MAX" style="width: 20%;">
    `;
    filterMenu.appendChild(dcDiv);

    // Ritual (checkbox)
    const ritualDiv = document.createElement("div");
    ritualDiv.className = "filter-group";
    ritualDiv.innerHTML = `<label><input type="checkbox" id="filter-ritual"> RITUAL</label>`;
    filterMenu.appendChild(ritualDiv);

    // Volatile (checkbox)
    const volatileDiv = document.createElement("div");
    volatileDiv.className = "filter-group";
    volatileDiv.innerHTML = `<label><input type="checkbox" id="filter-volatile"> VOLATILE</label>`;
    filterMenu.appendChild(volatileDiv);
  }

  // Add additional categories like Potions, Glyphs, etc. here
  
}
  
function setupFilterListeners() {
const inputs = filterMenu.querySelectorAll("select, input[type=checkbox], input[type=number]");

inputs.forEach(input => {
input.addEventListener("change", applyFilters);
});

}

function applyFilters() {
  const subject = document.getElementById("filter-subject")?.value || "";
  const level = document.getElementById("filter-level")?.value || "";
  const dcMin = parseInt(document.getElementById("filter-dc-min")?.value) || null;
  const dcMax = parseInt(document.getElementById("filter-dc-max")?.value) || null;
  const ritual = document.getElementById("filter-ritual")?.checked || false;
  const volatileTag = document.getElementById("filter-volatile")?.checked || false;

  const categoryKey = dropdown.value;

  list.innerHTML = ""; // clear current entries

  currentData.forEach(entry => {
    // Start by assuming the entry passes
    let show = true;
	let isHex = false;
	
    // Subject filter
    if (subject && entry.SUBJECT !== subject && subject !== "ANY") show = false;
	
	
	if (entry.LEVEL.split(' ')[0] === "HEX") isHex = true;
    // Level filter
    if (level && entry.LEVEL !== level && level !== "ANY") {
		show = false;
	};
	if (level && level === "HEX" && isHex) show = true;

    // DC filter
    const dc = parseInt(entry.DC);
    if (dcMin !== null && (dc < dcMin || isNaN(dc))) show = false;
    if (dcMax !== null && (dc > dcMax || isNaN(dc))) show = false;
	
    // Ritual filter
    if (ritual && entry.RITUAL !== "YES") show = false;

    // Volatile filter
    if (volatileTag && entry.VOLATILE !== "YES") show = false;

    if (show) {
      const card = document.createElement("div");
      card.className = "entry";
      const category = entry.ID.split('_')[0].toLowerCase();
      const headerFormat = headerFields[category] || (() => "");

      card.innerHTML = `
        <div class="entry-header">
          <div>
            ${entry.NAME || "Unnamed"}
            <div class="entry-meta">
              ${headerFormat(entry)}
            </div>
          </div>
          <div>▼</div>
        </div>

        <div class="entry-content">
          ${renderDetails(entry)}
        </div>
      `;

      card.addEventListener("click", () => card.classList.toggle("open"));

      list.appendChild(card);
    }
  });
}


loadSheet();
renderFilters(dropdown.value);
</script>

</body>
</html>
